apiVersion: v1
kind: Namespace
metadata:
  name: exercice-02

---

# pod-frontend.yaml
apiVersion: v1
kind: Pod
metadata:
  name: frontend
  namespace: exercice-02
  labels:
    app: frontend
    tier: web
spec:
  containers:
    - name: frontend
      image: nginx:1.25
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      ports:
        - containerPort: 80
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 10
        failureThreshold: 3
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 10
        periodSeconds: 15
        failureThreshold: 3

---

apiVersion: v1
kind: Pod
metadata:
  name: backend
  namespace: exercice-02
  labels:
    app: backend
    tier: api
spec:
  containers:
    - name: backend
      image: hashicorp/http-echo:0.2.3
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      args:
        - "-text=API OK"
      ports:
        - containerPort: 5678

---

apiVersion: v1
kind: Pod
metadata:
  name: database
  namespace: exercice-02
  labels:
    app: database
    tier: data
spec:
  containers:
    - name: database
      image: redis:7
      ports:
        - containerPort: 6379
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-data
  namespace: dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
  storageClassName: standard
---
apiVersion: v1
kind: Pod
metadata:
  name: demo-pvc-writer
  namespace: dev
spec:
  containers:
    - name: writer
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "$(date) — données écrites par demo-pvc-writer" > /data/fichier.txt
          cat /data/fichier.txt
          sleep 3600
      volumeMounts:
        - name: persistent
          mountPath: /data
      resources:
        requests: {cpu: "5m", memory: "8Mi"}
        limits: {cpu: "50m", memory: "32Mi"}
  volumes:
    - name: persistent
      persistentVolumeClaim:
        claimName: app-data
# Vérifier le binding PVC → PV :
#   kubectl get pvc app-data -n dev
#   kubectl get pv
#   kubectl exec demo-pvc-writer -n dev -- cat /data/fichier.txt
#
# Supprimer le pod et recréer pour voir que les données persistent :
#   kubectl delete pod demo-pvc-writer -n dev
#   kubectl apply -f 04-pvc-reader.yaml
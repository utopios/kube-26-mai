apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: metrics-agent
  namespace: voting
  labels:
    app: metrics-agent
spec:
  selector:
    matchLabels:
      app: metrics-agent
  template:
    metadata:
      labels:
        app: metrics-agent
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      # Aucune toleration : le DS n'ira pas sur le control-plane qui a un taint
      # node-role.kubernetes.io/control-plane:NoSchedule par defaut.
      containers:
        - name: metrics-agent
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - 'while true; do echo "[$(date)] Node=$NODE_NAME - Pods=$(ls /var/log/pods/ 2>/dev/null | wc -l)"; sleep 30; done'
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: varlogpods
          hostPath:
            path: /var/log/pods
            type: DirectoryOrCreate

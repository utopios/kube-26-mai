---
apiVersion: batch/v1
kind: Job
metadata:
  name: vote-report
  namespace: voting
spec:
  completions: 3
  parallelism: 2
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: report
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB \
                -c "SELECT vote, COUNT(id) AS total FROM votes GROUP BY vote;" \
              && echo "Rapport genere a $(date)"
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: voting-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: voting-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: voting-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: voting-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voting-secrets
                  key: POSTGRES_PASSWORD
            # psql lit le mot de passe depuis PGPASSWORD (non-interactif)
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: voting-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vote-stats
  namespace: voting
spec:
  schedule: "*/1 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: stats
              image: postgres:15-alpine
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - |
                  psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB \
                    -c "SELECT vote, COUNT(id) AS total FROM votes GROUP BY vote;" \
                  && echo "Stats generees a $(date)"
              env:
                - name: POSTGRES_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: voting-config
                      key: POSTGRES_HOST
                - name: POSTGRES_DB
                  valueFrom:
                    configMapKeyRef:
                      name: voting-config
                      key: POSTGRES_DB
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: voting-secrets
                      key: POSTGRES_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: voting-secrets
                      key: POSTGRES_PASSWORD
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi

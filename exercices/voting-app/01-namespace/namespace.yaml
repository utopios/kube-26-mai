---
apiVersion: v1
kind: Namespace
metadata:
  name: voting
  labels:
    app: voting-app
    environment: dev
    team: platform
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: voting-quota
  namespace: voting
spec:
  hard:
    pods: "20"
    requests.cpu: "4"
    requests.memory: 8Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: voting-limits
  namespace: voting
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
